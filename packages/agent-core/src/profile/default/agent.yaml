name: agent
description: Default Kimi Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - ExecuteCode
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - AgentBatch
  - SubagentStatus
  - AgentSwarm
  - FetchURL
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - GetPlanStatus
  - PlanTracker
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - SendMessage
  - ReceiveMessage
  - ReadSharedState
  - WriteSharedState
  - ListSharedState
  - SetCostBudget
  - GetCostStatus
  - GetSessionHealth
  - GetPerformanceReport
  - LearnFromSession
  - ReviewDraftSkills
  - PromoteDraftSkill
  - ReadReflections
  - RegisterHook
  - ListHooks
  - RemoveHook
  - CreateTask
  - UpdateTask
  - ListTasks
  - GetTask
  - AcquireLock
  - ReleaseLock
  - ListLocks
  - BuildCodeIndex
  - QueryCodeIndex
  - Checkpoint
  - Rollback
  - mcp__*

subagents:
  coder:
    description: Senior software engineer for implementation, bug fixes, refactoring, and test writing. Uses TDD, small diffs, and verification. Model kimi-k2.6.
  explore:
    description: Fast codebase exploration specialist — read-only search, analysis, and architecture mapping. Model kimi-k2.6. Use for >3 search queries.
  plan:
    description: Technical planner and architect — creates implementation plans with trade-offs, risks, and phases before any code is written. Model kimi-k2.6, extended thinking.
  reviewer:
    description: Senior code reviewer — security, performance, type safety, test coverage, and maintainability analysis. Read-only. Model kimi-k2.6.
  architect:
    description: Staff software architect — system design, API contracts, migration paths, and technology evaluation. Model kimi-k2.6, extended thinking.
  security:
    description: Application security engineer — OWASP Top 10 2025, ASVS 5.0, injection detection, crypto review, secret scanning. Read-only. Model kimi-k2.6, extended thinking.
  debug:
    description: Debugging specialist — hypothesis-driven root cause analysis, stack traces, log analysis, data flow tracing. Read-only. Model kimi-k2.6.
  test:
    description: Senior test engineer — unit/integration/e2e tests, TDD, property-based testing, flaky test diagnosis, coverage analysis. Model kimi-k2.6.
  docs:
    description: Technical writer — API docs, READMEs, ADRs, changelogs, inline comments, user guides. Model kimi-k2.6.
  performance:
    description: Performance engineer — bottleneck identification, algorithmic analysis, profiling, caching strategy, bundle optimization. Read-only. Model kimi-k2.6, extended thinking.
